# ════════════════════════════════════════════════════════════════════
# /etc/nginx/sites-available/securevault.conf
# SecureVault reverse proxy — TLS 1.3, HSTS, rate limit, slow-loris
# ════════════════════════════════════════════════════════════════════
# Symlink: ln -s /etc/nginx/sites-available/securevault.conf \
#                /etc/nginx/sites-enabled/
# Test: nginx -t  →  Reload: systemctl reload nginx
# ════════════════════════════════════════════════════════════════════

# ── Rate limit zone'ları (http {} bloğunda da olabilir) ──
limit_req_zone   $binary_remote_addr zone=sv_general:10m rate=60r/m;
limit_req_zone   $binary_remote_addr zone=sv_upload:10m  rate=10r/m;
limit_req_zone   $binary_remote_addr zone=sv_email:10m   rate=5r/m;
limit_req_zone   $binary_remote_addr zone=sv_admin:10m   rate=30r/m;
limit_conn_zone  $binary_remote_addr zone=sv_conn:10m;

# ── Origin koruma (GOZLEM MODU): baglanti Cloudflare'den mi? ──
geo $realip_remote_addr $is_cloudflare {
    default 0;
    173.245.48.0/20 1;
    103.21.244.0/22 1;
    103.22.200.0/22 1;
    103.31.4.0/22 1;
    141.101.64.0/18 1;
    108.162.192.0/18 1;
    190.93.240.0/20 1;
    188.114.96.0/20 1;
    197.234.240.0/22 1;
    198.41.128.0/17 1;
    162.158.0.0/15 1;
    104.16.0.0/13 1;
    104.24.0.0/14 1;
    172.64.0.0/13 1;
    131.0.72.0/22 1;
    2400:cb00::/32 1;
    2606:4700::/32 1;
    2803:f800::/32 1;
    2405:b500::/32 1;
    2405:8100::/32 1;
    2a06:98c0::/29 1;
    2c0f:f248::/32 1;
}

# Gozlem log formati: hangi baglanti CF mi degil mi gorelim
log_format cf_observe '$realip_remote_addr cf=$is_cloudflare "$request" $status';

# ── HTTP → HTTPS redirect + ACME challenge ──
server {
    listen 80;
    listen [::]:80;
    server_name sifreliveritransferi.com;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sifreliveritransferi.com;
    # ── Cloudflare gercek ziyaretci IP'sini geri yukle ──
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;
    # ── ORIGIN KILIDI: Cloudflare disi dogrudan baglantilari reddet ──
    # $is_cloudflare geo blogunda tanimli (0 = bypass, 1 = Cloudflare).
    if ($is_cloudflare = 0) {
        return 403;
    }

    # ── TLS ──
    ssl_certificate     /etc/letsencrypt/live/sifreliveritransferi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sifreliveritransferi.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/sifreliveritransferi.com/chain.pem;

    # Sadece TLS 1.3 (modern profil). Eski tarayıcı desteği gerekiyorsa 1.2 ekle.
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ecdh_curve X25519:secp384r1;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 9.9.9.9 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ──
    # HSTS — 2 yıl, includeSubDomains, preload (preload öncesi siteyi test et)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    # CSP zaten helmet'te tanımlı; nginx'te tekrar set etme — çakışır.

    # ── Slow-loris / yavaş istemci koruması ──
    client_body_timeout    15s;
    client_header_timeout  10s;
    send_timeout           20s;
    keepalive_timeout      30s;
    keepalive_requests     100;
    reset_timedout_connection on;

    # ── Boyut limitleri ──
    # Streaming chunk en fazla 10MB; eski /upload tek seferde 250MB; daha cömert ol.
    client_max_body_size   2100m;
    client_body_buffer_size 128k;
    large_client_header_buffers 4 8k;

    # ── Per-IP eş zamanlı bağlantı tavanı ──
    limit_conn sv_conn 30;

    # ── Genel rate limit ──
    limit_req zone=sv_general burst=120 nodelay;
    limit_req_status 429;
    limit_conn_status 429;

    # ── Sadece beklenen HTTP metodları ──
    if ($request_method !~ ^(GET|POST|HEAD)$) {
        return 405;
    }

    # Server bilgisini sakla (nginx.conf'ta server_tokens off; de olmalı)
    server_tokens off;

    # ── Gzip — encrypted blob'lara gerek yok, yine de compression side-channel için kapat ──
    gzip off;

    # ── Upload endpoint'leri için sıkı limit ──
    location ~ ^/upload(/|$) {
        limit_req zone=sv_upload burst=1100 nodelay;
        limit_conn sv_conn 5;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;     # Tek hop — spoof zorlaşır
        proxy_set_header X-Forwarded-Proto $scheme;

        # Upload uzun sürebilir
        proxy_request_buffering off;     # Stream — RAM patlamasın
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Admin endpoint'leri için rate limit (brute-force/abuse koruması) ──
    location ^~ /admin/ {
        allow 31.223.63.77;
        deny all;
        limit_req zone=sv_admin burst=10 nodelay;
        limit_conn sv_conn 3;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # ── E-posta endpoint'i için en sıkı limit (spam vektörü) ──
    location = /send-link {
        limit_req zone=sv_email burst=3 nodelay;
        limit_conn sv_conn 2;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health check (loopback only) ──
    location = /health {
        proxy_pass http://127.0.0.1:3000;
    }

    # ── Hassas dosyaları engelle ──
    location ~ /\.(env|git|vscode|sixth) { deny all; return 404; }
    location ~ \.(md|json|lock|js\.map)$ { deny all; return 404; }

    # ── /dl/ indirme route ──
    location /dl/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Diğer her şey ──
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Erişim logları (fail2ban için JSON formatı) ──
    access_log /var/log/nginx/securevault.access.log combined;
    access_log /var/log/nginx/cf_observe.log cf_observe;
}
